<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="x-apple-disable-message-reformatting" />
  <title>{{subject_line}}</title>
  <style type="text/css">
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }

    /* Base */
    body { margin: 0; padding: 0; background-color: {{body_background}}; font-family: {{font_family}}; }
    .email-wrapper { width: 100%; background-color: {{body_background}}; }
    .email-content { max-width: 600px; margin: 0 auto; }

    /* Header */
    .header { background-color: {{primary_color}}; padding: 24px 32px; }
    .header img { display: block; }

    /* Hero */
    .hero { background-color: {{secondary_color}}; padding: 40px 32px 32px; }
    .hero h1 { color: {{secondary_text}}; font-size: 28px; line-height: 1.3; margin: 0 0 12px; font-weight: 700; }
    .hero p { color: {{secondary_text}}; font-size: 18px; line-height: 1.5; margin: 0; opacity: 0.9; }

    /* Body */
    .body-section { background-color: #FFFFFF; padding: 32px; }
    .body-section p { color: {{body_text}}; font-size: 16px; line-height: 1.7; margin: 0 0 20px; }
    .body-section p:last-child { margin-bottom: 0; }

    /* CTA */
    .cta-section { background-color: #FFFFFF; padding: 8px 32px 40px; text-align: center; }

    /* Footer */
    .footer { background-color: {{body_background}}; padding: 24px 32px; border-top: 1px solid {{border_color}}; }
    .footer p { color: {{muted_text}}; font-size: 13px; line-height: 1.5; margin: 0 0 8px; text-align: center; }
    .footer a { color: {{muted_text}}; text-decoration: underline; }

    /* Mobile */
    @media (max-width: 600px) {
      .email-content { width: 100% !important; }
      .header, .hero, .body-section, .cta-section, .footer { padding-left: 20px !important; padding-right: 20px !important; }
      .hero h1 { font-size: 22px !important; }
      .cta-button { width: 100% !important; }
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body, .email-wrapper { background-color: #0F172A !important; }
      .body-section { background-color: #1E293B !important; }
      .body-section p { color: #F1F5F9 !important; }
      .footer { background-color: #0F172A !important; border-top-color: #334155 !important; }
      .footer p, .footer a { color: #94A3B8 !important; }
    }
  </style>
</head>
<body>
  <!-- Preheader text (hidden) -->
  <div style="display:none;font-size:1px;color:#FFFFFF;line-height:1px;max-height:0px;max-width:0px;opacity:0;overflow:hidden;">
    {{preheader}}
  </div>

  <!-- Email wrapper -->
  <table class="email-wrapper" cellpadding="0" cellspacing="0" border="0" width="100%">
    <tr>
      <td align="center" valign="top">
        <table class="email-content" cellpadding="0" cellspacing="0" border="0" width="600">

          <!-- View in browser -->
          <tr>
            <td style="padding: 8px 32px; text-align: center;">
              <p style="font-size: 12px; color: {{muted_text}}; margin: 0;">
                <a href="{{view_in_browser_url}}" style="color: {{muted_text}};">View in browser</a>
              </p>
            </td>
          </tr>

          <!-- Header with logo -->
          <tr>
            <td class="header">
              <img src="{{logo_url}}" width="{{logo_width}}" height="{{logo_height}}" alt="{{logo_alt}}" />
            </td>
          </tr>

          <!-- Hero section -->
          <tr>
            <td class="hero">
              <h1>{{headline}}</h1>
              <p>{{subheadline}}</p>
            </td>
          </tr>

          <!-- Body: Hook -->
          <tr>
            <td class="body-section" style="padding-bottom: 0;">
              <p>Hi {{first_name}},</p>
              <p>{{hook}}</p>
            </td>
          </tr>

          <!-- Body: Value -->
          <tr>
            <td class="body-section" style="padding-top: 0; padding-bottom: 0;">
              <p>{{value_section}}</p>
            </td>
          </tr>

          <!-- Body: Proof -->
          <tr>
            <td class="body-section" style="padding-top: 0;">
              <p style="font-style: italic; border-left: 3px solid {{accent_color}}; padding-left: 16px;">{{proof_section}}</p>
            </td>
          </tr>

          <!-- CTA button -->
          <tr>
            <td class="cta-section">
              <!--[if mso]>
              <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word"
                href="{{cta_url}}" style="height:48px;v-text-anchor:middle;width:220px;" arcsize="8%"
                stroke="f" fillcolor="{{accent_color}}">
                <w:anchorlock/>
                <center style="color:#FFFFFF;font-family:Arial,sans-serif;font-size:16px;font-weight:bold;">
                  {{cta_button_text}}
                </center>
              </v:roundrect>
              <![endif]-->
              <!--[if !mso]><!-->
              <a href="{{cta_url}}" class="cta-button"
                style="background-color:{{accent_color}};border-radius:6px;color:#FFFFFF;display:inline-block;
                       font-family:{{font_family}};font-size:16px;font-weight:bold;line-height:48px;
                       text-align:center;text-decoration:none;width:220px;-webkit-text-size-adjust:none;">
                {{cta_button_text}}
              </a>
              <!--<![endif]-->
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding: 0 32px;">
              <hr style="border: 0; border-top: 1px solid {{border_color}}; margin: 0;" />
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="footer">
              <p>{{unsubscribe_text}}</p>
              <p>
                <a href="{{unsubscribe_url}}">Unsubscribe</a> &nbsp;&middot;&nbsp;
                <a href="{{preferences_url}}">{{manage_preferences_text}}</a>
              </p>
              <p>{{company_name}} &middot; {{physical_address}}</p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

  <!-- Tracking pixel -->
  <img src="{{tracking_pixel_url}}" width="1" height="1" border="0" alt="" style="height:1px!important;width:1px!important;border-width:0!important;margin:0!important;padding:0!important;" />

</body>
</html>
